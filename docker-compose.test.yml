version: '3.8'

services:
  m2m-frontend-test:
    restart: always
    build:
      context: ./frontend
      args:
        # [CRITICAL] NEXT_PUBLIC_* must be build args — baked into JS bundle at build time
        - NEXT_PUBLIC_API_URL=http://76.13.244.202/api
    container_name: m2m-frontend-test
    ports:
      - "3011:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://76.13.244.202/api
      - TZ=Asia/Dhaka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  m2m-mongodb-test:
    image: mongo:latest
    container_name: m2m-mongodb-test
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - m2m_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  m2m-mongodb-init-test:
    image: mongo:latest
    container_name: m2m-mongodb-init-test
    depends_on:
      m2m-mongodb-test:
        condition: service_healthy
    command: >
      mongosh --host m2m-mongodb-test:27017 --eval
      "let count = 0;
       while (count < 20) {
         try {
           rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'm2m-mongodb-test:27017' }] });
           print('[INIT] ✅ Replica Set rs0 initiated successfully.');
           quit(0);
         } catch(e) {
           if (e.message.includes('already')) {
             print('[INIT] ℹ️ Replica Set already initialized.');
             quit(0);
           }
           print('[INIT] ⏳ Waiting... (' + e.message + ')');
           sleep(2000);
           count++;
         }
       }
       quit(1);"
    restart: "no"

  m2m-redis-test:
    image: redis:alpine
    container_name: m2m-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  m2m-backend-test:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: m2m-backend-test
    ports:
      - "5011:5050"
    # [SECURITY] All secrets loaded from gitignored .env.test — never hardcoded here
    env_file:
      - ./backend/.env.test.vps
    environment:
      - PORT=5050
      - NODE_ENV=production
      - MONGODB_URI=mongodb://m2m-mongodb-test:27017/universal_game_core_docker?replicaSet=rs0
      - REDIS_URL=redis://m2m-redis-test:6379
      - TZ=Asia/Dhaka
      - CLIENT_URL=http://76.13.244.202
    # [AUTO-SEED] Seeds Account Tiers + Tasks on startup, then launches server
    command: node server.js
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      m2m-mongodb-init-test:
        condition: service_completed_successfully
      m2m-redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  m2m_test_data:
