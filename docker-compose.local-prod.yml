version: '3.8'

services:

  # 1. Backend
  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: m2m-backend-prod-test
    environment:
      - NODE_ENV=production
      - PORT=5050
      - JWT_SECRET=supersecretkeyremitwallet123
      - GEMINI_API_KEY=AIzaSyApJEjpj_V2QT4SksDi-Lu00WEuUFpz4dE
      - SUPER_ADMIN_SEC_KEY_1=1111
      - SUPER_ADMIN_SEC_KEY_2=2222
      - SUPER_ADMIN_SEC_KEY_3=3333
      # [POINT TO HOST MONGO] Using the host machine's MongoDB (seen in Compass)
      - MONGODB_URI=mongodb://host.docker.internal:27017/universal_game_core_v1
      - REDIS_URL=redis://host.docker.internal:6379
      - TZ=Asia/Dhaka
      - CLIENT_URL=http://localhost:3010
    ports:
      - "5050:5050"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    extra_hosts:
      # CRITICAL: Allows Docker container to see the Windows Host 'localhost'
      - "host.docker.internal:host-gateway"

  # 2. Frontend
  frontend:
    restart: always
    build:
      context: ./frontend
      args:
        # Build-time API URL for the local simulator
        - NEXT_PUBLIC_API_URL=http://localhost:5050/api
    container_name: m2m-frontend-prod-test
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5050/api
    ports:
      - "3010:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  # Internal volume no longer strictly needed if using host MongoDB, but kept for future use if needed
  m2m_prod_data:
