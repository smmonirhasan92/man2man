version: '3.8'

services:

  # 1. Backend
  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: m2m-backend-prod-test
    # [SECURITY] All secrets loaded from gitignored .env.test — never hardcoded here
    env_file:
      - ./backend/.env.test
    environment:
      - NODE_ENV=production
      # [STANDARDIZED] PORT 5050 matches Nginx proxy_pass across all environments
      - PORT=5050
    ports:
      - "5050:5050"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    extra_hosts:
      # CRITICAL: Allows Docker container to see the Windows Host 'localhost'
      - "host.docker.internal:host-gateway"

  # 2. Frontend
  frontend:
    restart: always
    build:
      context: ./frontend
      args:
        # Build-time API URL for the local simulator
        - NEXT_PUBLIC_API_URL=http://localhost:5050/api
    container_name: m2m-frontend-prod-test
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5050/api
    ports:
      - "3010:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  # Internal volume no longer strictly needed if using host MongoDB, but kept for future use if needed
  m2m_prod_data:
