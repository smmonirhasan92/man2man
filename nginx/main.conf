# ============================================================
# PRODUCTION NGINX CONFIG — usaaffiliatemarketing.com
# Manages: Frontend (3000), Backend API (5050), Socket.io
# ============================================================

server {
    server_name usaaffiliatemarketing.com www.usaaffiliatemarketing.com;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Maintenance Fallback ----
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /var/www/man2man;
        internal;
    }

    # ---- Upload Size (for proof images via multer) ----
    client_max_body_size 10M;

    # ---- API Proxy → Backend PORT 5050 ----
    location /api {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Gzip API responses
        gzip on;
        gzip_types application/json;
    }

    # ---- Socket.io WebSocket Proxy → Backend PORT 5050 ----
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket must never be buffered
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        # Long timeout for persistent WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Static Uploads (served directly, no proxy overhead) ----
    location /uploads/ {
        alias /var/www/man2man/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Frontend → Next.js Standalone PORT 3000 ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ---- SSL via Let's Encrypt (Certbot managed) ----
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/usaaffiliatemarketing.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/usaaffiliatemarketing.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ---- HTTP → HTTPS Redirect ----
server {
    listen 80;
    server_name usaaffiliatemarketing.com www.usaaffiliatemarketing.com;
    return 301 https://$host$request_uri;
}
