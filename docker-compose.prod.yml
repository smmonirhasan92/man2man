version: '3.8'

services:
  frontend:
    restart: always # Critical for server stability
    network_mode: "host"
    build:
      context: ./frontend
      args:
        # Override for the live VPS public API URL
        - NEXT_PUBLIC_API_URL=https://usaaffiliatemarketing.com/api
    container_name: m2m-frontend
    environment:
      - PORT=3010
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://usaaffiliatemarketing.com/api
      - TZ=Asia/Dhaka

  backend:
    restart: always # Critical for server stability
    network_mode: "host"
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: m2m-backend
    environment:
      - PORT=5010
      - NODE_ENV=production
      - MONGODB_URI=mongodb://127.0.0.1:27017/universal_game_core_docker
      - REDIS_URL=redis://127.0.0.1:6379
      - TZ=Asia/Dhaka
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
