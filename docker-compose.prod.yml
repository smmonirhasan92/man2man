version: '3.8'

services:
  frontend:
    restart: always
    network_mode: "host"
    build:
      context: ./frontend
      args:
        # Override for the live VPS public API URL
        - NEXT_PUBLIC_API_URL=https://usaaffiliatemarketing.com/api
    container_name: m2m-frontend
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://usaaffiliatemarketing.com/api
      - TZ=Asia/Dhaka

  backend:
    restart: always
    network_mode: "host"
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: m2m-backend
    # [SECURITY] All secrets loaded from gitignored .env.prod — NEVER hardcoded here
    env_file:
      - ./backend/.env.prod
    environment:
      # [STANDARDIZED] PORT 5050 — matches Nginx proxy_pass configuration
      - PORT=5050
      - NODE_ENV=production
      - TZ=Asia/Dhaka
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
