version: '3.8'

services:
  frontend:
    restart: always # Critical for server stability
    build:
      context: ./frontend
      args:
        # Override for the live VPS public API URL
        - NEXT_PUBLIC_API_URL=https://usaaffiliatemarketing.com/api
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://usaaffiliatemarketing.com/api

  backend:
    restart: always # Critical for server stability
    environment:
      - NODE_ENV=production
      # [FIX] Using the custom Docker bridge IP (172.18.0.1) identified as the actual gateway for this app.
      - MONGODB_URI=mongodb://172.18.0.1:27017/universal_game_core_v1
      - REDIS_URL=redis://172.18.0.1:6379
      # Force UTC server to run node-cron tasks exactly in Dhaka timezone
      - TZ=Asia/Dhaka
    volumes:
      # CRITICAL: Prevent 14GB data / user uploads from being deleted on VPS Docker rebuilds
      - ./uploads:/app/uploads
      # Persist the Winson / Node server logs in host
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
